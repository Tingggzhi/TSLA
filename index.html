<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockRadar | 旗艦戰情終端 v10.3 (實時 AI 版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-card: rgba(18, 22, 28, 0.98);
            --accent-gold: #f1c40f;
            --bullish: #ff4d4d; /* 🔴 亞洲漲 */
            --bearish: #2ecc71; /* 🟢 亞洲跌 */
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f0;
            --text-dim: #777;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% -15%, #1c2635, var(--bg-deep) 75%);
            color: var(--text-main); font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            font-size: 0.9rem; line-height: 1.6; overflow-x: hidden;
        }

        header {
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(25px); background: rgba(5,7,10,0.7); border-bottom: 1px solid var(--border-glass);
            position: sticky; top: 0; z-index: 2000;
        }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-box img { height: 32px; filter: drop-shadow(0 0 5px var(--accent-gold)); }

        .app-layout { max-width: 1800px; margin: 25px auto; padding: 0 25px; display: grid; grid-template-columns: 320px 1fr; gap: 25px; }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .panel { 
            background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 20px; 
            padding: 22px; box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }
        .panel-title { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-left: 3px solid var(--accent-gold); padding-left: 10px; }

        .asset-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); padding: 18px;
            border-radius: 14px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .asset-card.active { border-color: var(--accent-gold); background: rgba(241,196,15,0.1); }
        .asset-card:hover:not(.active) { background: rgba(255,255,255,0.05); transform: translateX(5px); }

        .main-stage { display: flex; flex-direction: column; gap: 25px; }

        .tab-bar { display: flex; gap: 15px; border-bottom: 1px solid #111; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 15px 25px; cursor: pointer; color: #666; font-weight: 700; position: relative; transition: 0.3s; font-size: 0.95rem; }
        .tab-btn.active { color: var(--accent-gold); font-size: 1rem; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 4px; background: var(--accent-gold); border-radius: 5px; }

        .tab-view { display: none; }
        .tab-view.active { display: flex; flex-direction: column; gap: 25px; }

        .ency-sect { background: rgba(0,0,0,0.35); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.03); }
        .ency-sect h3 { color: var(--accent-gold); font-size: 1.25rem; border-left: 5px solid var(--accent-gold); padding-left: 20px; margin-bottom: 25px; }

        .expert-box { background: rgba(52, 152, 219, 0.08); border: 1px solid rgba(52, 152, 219, 0.3); border-radius: 15px; padding: 30px; margin-top: 10px; line-height: 1.8; }
        .advice-box { background: rgba(241,196,15,0.08); border: 1px solid rgba(241,196,15,0.25); border-radius: 15px; padding: 30px; border-left: 6px solid var(--accent-gold); }

        .chart-container { height: 620px; width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-glass); background: #000; }

        .tag { border-radius: 50px; padding: 5px 15px; font-size: 0.75rem; font-weight: 700; margin-right: 8px; border: 1px solid transparent; }
        .tag-pro { background: rgba(255,77,77,0.1); color: var(--bullish); border-color: var(--bullish); }
        .tag-con { background: rgba(46,204,113,0.1); color: var(--bearish); border-color: var(--bearish); }

        .q-card { background: rgba(0,0,0,0.25); border: 1px solid #1a1a1a; padding: 22px; border-radius: 15px; height: 100%; }
        .q-card h4 { color: var(--accent-gold); font-size: 0.75rem; margin-bottom: 12px; font-family: 'JetBrains Mono'; text-transform: uppercase; }

        .prompt-box { background: #000; border: 1px dashed #444; border-radius: 10px; padding: 20px; font-family: 'JetBrains Mono'; font-size: 0.85rem; color: #2ecc71; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        .prompt-box:hover { border-color: #2ecc71; background: rgba(46,204,113,0.05); }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://img.icons8.com/isometric/50/ffffff/radar.png" alt="Radar-Logo">
        <h2 style="font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px;">StockRadar <span style="color: var(--accent-gold); font-weight: 300;">PRO AI Dashboard</span></h2>
    </div>
    <div style="font-size: 0.8rem; color: #555;">SOURCE: <span style="color: var(--bearish);">REAL_TIME_ANALYSIS</span> // STATUS: <span style="color: var(--bullish);">LIVE</span></div>
</header>

<div class="app-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="panel">
            <div class="panel-title"><i class="fas fa-satellite"></i> 監測資產核心</div>
            <div id="assetNav"></div>
        </div>
        <div class="panel">
            <div class="panel-title"><i class="fas fa-flag"></i> 宏觀戰略概覽</div>
            <p style="font-size:0.75rem; color:#888; line-height:1.8;">當前 AI 分析引擎為 Gemini 2.5 Pro。數據為全球權威財經來源之即時彙整結果。</p>
        </div>
    </div>

    <!-- MAIN STAGE -->
    <div class="main-stage">
        <div class="tab-bar">
            <div class="tab-btn active" id="tab-asset" onclick="switchView('asset')"><i class="fas fa-microchip"></i> 旗艦個股戰略偵察終端</div>
        </div>

        <!-- ASSET DETAIL VIEW -->
        <div id="view-asset" class="tab-view active">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><h1 id="heroSym" style="font-size: 4rem; font-family:'JetBrains Mono'; margin-bottom:5px;">-</h1><p id="heroName" style="color:#666; font-size:1.2rem;">-</p></div>
                    <div style="text-align:right;">
                        <h2 id="heroStatus" style="font-size: 3.5rem; font-weight:700; font-family:'JetBrains Mono';">-</h2>
                        <div id="heroRating" style="color:var(--accent-gold); font-weight:700; font-size:1rem;">AI RISK LEVEL: -</div>
                    </div>
                </div>
                <div id="tradingview_chart" class="chart-container"></div>
            </div>

            <!-- AI Insight Hub -->
            <div class="ency-sect" style="border: 2px solid var(--accent-gold); background: rgba(241,196,15,0.03);">
                <h3><i class="fas fa-chess-knight"></i> Gemini 2.5 Pro 深度戰報</h3>
                <div id="sect-summary" style="font-size: 1.1rem; line-height: 1.8; color: #eee;"></div>
            </div>

            <div class="ency-sect">
                <h3><i class="fas fa-vault"></i> 實時風險評級判讀</h3>
                <div id="sect-risk-deep" style="display:grid; grid-template-columns:1fr 1fr; gap:35px;">
                    <div class="q-card"><h4>風險等級</h4><p id="risk-val" style="font-size: 1.5rem; color: var(--accent-gold);">-</p></div>
                    <div class="q-card"><h4>情緒強度 (Sentiment)</h4><p id="sent-val" style="font-size: 1.5rem; color: var(--bearish);">-</p></div>
                </div>
            </div>

            <div class="ency-sect">
                <h3><i class="fas fa-clock"></i> 最近一筆即時快訊標題</h3>
                <div id="sect-title" style="font-weight: 700; font-size: 1.1rem; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 10px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 從 Express 獲取動態數據
    const RAW_DATA = [{"symbol":"ZIM","title":"Red Sea tensions spike shipping rates.","sentiment_score":4.2,"risk_level":"High","summary":"紅海危機導致運費飆升，資產變現能力增強。","timestamp":"2026-03-22 14:44:48"},{"symbol":"TSLA","title":"Tesla price cuts in China continues!","sentiment_score":-3.5,"risk_level":"Critical","summary":"特斯拉在中國市場面臨激烈競爭，毛利率壓力巨大。","timestamp":"2026-03-22 14:44:48"},{"symbol":"RACE","title":"Ferrari earnings beat expectations.","sentiment_score":2.5,"risk_level":"Low","summary":"奢侈品市場需求穩定，法拉利訂單排到 2026 年後。","timestamp":"2026-03-22 14:44:48"},{"symbol":"PLTR","title":"Palantir wins new US Army contract.","sentiment_score":1.2,"risk_level":"Medium","summary":"Palantir 持續穩定獲取政府大單。","timestamp":"2026-03-22 14:44:48"}];
    
    // 轉換為前端 STORAGE
    const STORAGE = {};
    RAW_DATA.forEach(s => {
        STORAGE[s.symbol] = {
            symbol: s.symbol,
            name: s.symbol, // 可以考慮在 DB 加入 Name 欄位
            riskLevel: s.risk_level,
            sentimentScore: s.sentiment_score,
            summary: s.summary,
            title: s.title,
            timestamp: s.timestamp
        };
    });

    let activeSym = RAW_DATA[0] ? RAW_DATA[0].symbol : '';

    function init() { 
        if (!activeSym) return;
        renderNav(); 
        selectAsset(activeSym); 
    }

    function switchView(v) {
        document.querySelectorAll('.tab-view').forEach(view => view.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
    }

    function renderNav() {
        document.getElementById('assetNav').innerHTML = Object.keys(STORAGE).map(sym => `
            <div class="asset-card ${sym === activeSym ? 'active' : ''}" onclick="selectAsset('${sym}')">
                <div><div style="font-weight:700; color:#fff;">${sym}</div></div>
                <div style="text-align:right;">
                    <div style="color:${STORAGE[sym].sentimentScore >= 0 ? 'var(--bullish)' : 'var(--bearish)'}; font-weight:700;">Score: ${STORAGE[sym].sentimentScore}</div>
                </div>
            </div>
        `).join('');
    }

    function selectAsset(sym) {
        activeSym = sym; const s = STORAGE[sym];
        renderNav(); 

        document.getElementById('heroSym').innerText = sym;
        document.getElementById('heroName').innerText = "Last Updated: " + s.timestamp;
        document.getElementById('heroRating').innerText = "AI RISK LEVEL: " + s.riskLevel;
        document.getElementById('heroStatus').innerText = s.sentimentScore >= 0 ? 'BULL' : 'BEAR';
        document.getElementById('heroStatus').style.color = s.sentimentScore >= 0 ? 'var(--bullish)' : 'var(--bearish)';

        document.getElementById('sect-summary').innerText = s.summary;
        document.getElementById('sect-title').innerText = s.title;
        document.getElementById('risk-val').innerText = s.riskLevel;
        document.getElementById('sent-val').innerText = s.sentimentScore;
        
        renderTV(sym);
    }

    function renderTV(symbol) {
        // 部分代號可能需要對應 TV 的 Exchange
        let tvSym = symbol;
        if (symbol === 'TSLA') tvSym = 'NASDAQ:TSLA';
        if (symbol === 'PLTR') tvSym = 'NYSE:PLTR';
        if (symbol === 'RACE') tvSym = 'NYSE:RACE';
        if (symbol === 'ZIM') tvSym = 'NYSE:ZIM';

        new TradingView.widget({
            "autosize": true, "symbol": tvSym, "interval": "D", "theme": "dark", "style": "1", "locale": "zh_TW",
            "container_id": "tradingview_chart", "upColor": "#ff4d4d", "downColor": "#2ecc71"
        });
    }

    window.onload = init;
</script>
</body>
</html>
